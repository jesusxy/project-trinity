{{ define "main" }}
  <h1>{{ .Title }}</h1>
  <div class="post-meta" style="margin-bottom: 12px; color: #828282; font-size: 11px;">
    {{ if not .Date.IsZero }}{{ .Date.Format "2006-01-02" }}{{ end }}
    {{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}
  </div>
  <div class="post-content">
    {{ .Content }}
  </div>
{{ end }}
